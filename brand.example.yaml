# Brand Token File — Professional Consulting Style Example
#
# Purpose: single source of truth for all visual identity tokens
#          consumed by every renderer (HTML, PDF, deck) in Jayson Docs.
#
# This file is the canonical example brand used in tests and onboarding.
# It demonstrates a corporate consulting visual style:
#   - Headings: Georgia 22 (relatively scaled down through h1–h4)
#   - Body: Arial 12
#   - Primary: deep navy (#001A70)
#   - Neutral: classic grey scale
#   - Chart palette: blue-family (qualitative + sequential)
#
# How it is produced in production:
#   - On setup, an LLM ingests a consultancy's real deliverables
#     (DOCX, PPTX, brand book PDFs, web style guide) and produces a
#     populated copy of this file.
#   - A human reviews, corrects, and approves it once.
#   - It then lives in the shared cloud-synced folder
#     (e.g. ~/Consultancy-Shared/brand.yaml).
#
# Field conventions:
#   - Colors: hex strings, no shorthand (use "#FFFFFF" not "#FFF").
#   - Fonts:  family names + fallback chain; weights as integer arrays.
#   - Spacing: a base unit in pixels + a scale of multipliers.
#   - Sizes:  prefer mm for print, px for screen. Be explicit with units.
#   - Paths:  relative to the shared folder root.
#
# Naming constraint: do not name the consultancy this style is modelled
# after. Use generic descriptions throughout. See docs/TASKS.md T-141a.

schemaVersion: "1.0.0"
lastUpdated: "2026-05-27"
source:
  generatedFrom:
    - "brand-guidelines-v2.pdf"
    - "proposal-template-2026.docx"
  generator: "claude-sonnet-4-6"
  reviewedBy: "example-reviewer"
  reviewedAt: "2026-05-27"

# ─────────────────────────────────────────────────────────────────────────
# 1. Identity
# ─────────────────────────────────────────────────────────────────────────
identity:
  name: "Corporate Consulting Example"
  legalName: "Corporate Consulting Example SAS"
  shortName: "CCE"
  tagline: "Strategy for ambitious organisations"
  confidentialityNotice: |
    Confidential — for the addressee only. Do not distribute.

# ─────────────────────────────────────────────────────────────────────────
# 2. Logo
# ─────────────────────────────────────────────────────────────────────────
logo:
  primary:
    svg: "assets/logo/primary.svg"
    png: "assets/logo/primary@2x.png"
    minWidthPx: 80
    intrinsicAspect: 4.0
  inverse:
    svg: "assets/logo/inverse.svg"
  monochrome:
    svg: "assets/logo/monochrome.svg"
  mark:
    svg: "assets/logo/mark.svg"
    usage: "favicons, small headers, watermarks"
  favicon: "assets/logo/favicon.ico"

# ─────────────────────────────────────────────────────────────────────────
# 3. Color palette
# ─────────────────────────────────────────────────────────────────────────
colors:
  brand:
    primary:   "#001A70"              # deep navy — dominant brand color
    secondary: "#2F6FBE"              # mid blue — supporting brand color
    tertiary:  "#6EA8D8"              # light blue — occasional accent
    dark:      "#001050"              # darkest (titles, headers)
    light:     "#EFF4FB"              # lightest (subtle backgrounds)

  neutral:
    "0":   "#FFFFFF"                  # pure white — page background
    "50":  "#F7F8FA"
    "100": "#ECEDF0"
    "200": "#D9DBE0"                  # borders, dividers
    "300": "#B8BCC5"
    "400": "#8E94A2"                  # muted text, captions
    "500": "#636978"
    "600": "#454C5C"                  # secondary text
    "700": "#2F3441"
    "800": "#1B2130"                  # primary text on light bg
    "900": "#0D1220"                  # headings, strong emphasis

  semantic:
    pageBackground:    "neutral.0"
    surfaceBackground: "neutral.50"   # callouts, cards
    textPrimary:       "neutral.800"
    textSecondary:     "neutral.600"
    textMuted:         "neutral.400"
    textOnBrand:       "neutral.0"    # text laid over brand.primary
    border:            "neutral.200"
    borderStrong:      "neutral.300"
    link:              "brand.primary"
    headingPrimary:    "brand.dark"
    accent:            "brand.secondary"

  status:
    success: "#1E6B3A"
    warning: "#A05C00"
    error:   "#A81F1F"
    info:    "#1A4E8A"

  chartPalette:
    # Blue-family qualitative palette: deep navy → mid blue → light blue → desaturated
    qualitative:
      - "#001A70"                     # deep navy
      - "#2F6FBE"                     # mid blue
      - "#6EA8D8"                     # light blue
      - "#8CB5D4"                     # desaturated blue
      - "#003399"                     # royal blue
      - "#4A90CC"                     # sky blue
      - "#A8C8E8"                     # pale blue
      - "#0D3E7A"                     # dark mid blue
    # Blue sequential: dark-blue → light-blue ramp for heatmaps/gradients
    sequential:
      - "#001A70"
      - "#2F6FBE"
      - "#6EA8D8"
      - "#A8C8E8"
      - "#EFF4FB"
    diverging:
      negative: "#A81F1F"
      neutral:  "#8E94A2"
      positive: "#1E6B3A"

# ─────────────────────────────────────────────────────────────────────────
# 4. Typography
# ─────────────────────────────────────────────────────────────────────────
# Corporate consulting style: Georgia for headings, Arial for body.
typography:
  fonts:
    heading:
      family: "Georgia, 'Times New Roman', Times, serif"
      source: "system"
      weights: [400, 700]
    body:
      family: "Arial, 'Helvetica Neue', Helvetica, sans-serif"
      source: "system"
      weights: [400, 700]
    mono:
      family: "'Courier New', Courier, monospace"
      source: "system"
      weights: [400]

  scale:
    # h1 at 22 (base), scaling relatively: h2≈19, h3≈16, h4≈14
    h1:      22
    h2:      19
    h3:      16
    h4:      14
    h5:      12
    h6:      11
    body:    12
    bodyLg:  13
    caption: 10
    overline: 10
    deckTitle: 36
    deckBody: 16

  lineHeight:
    tight:   1.15
    snug:    1.3
    normal:  1.5
    relaxed: 1.7

  letterSpacing:
    tight:  "-0.02em"
    normal: "0"
    wide:   "0.05em"

  emphasis:
    strong: { weight: 700 }
    em:     { style: "italic" }

# ─────────────────────────────────────────────────────────────────────────
# 5. Spacing scale
# ─────────────────────────────────────────────────────────────────────────
spacing:
  unit: 4
  scale: [0, 1, 2, 3, 4, 6, 8, 12, 16, 24, 32, 48]

# ─────────────────────────────────────────────────────────────────────────
# 6. Page layout (flowing documents → PDF)
# ─────────────────────────────────────────────────────────────────────────
page:
  size: "A4"
  orientation: "portrait"
  margins:
    top:    20
    right:  20
    bottom: 20
    left:   20
  header:
    enabled: true
    heightMm: 12
    content: "logo-left + project-title-right"
  footer:
    enabled: true
    heightMm: 10
    content: "confidentiality-left + page-number-right"
    pageNumberFormat: "Page {n} of {total}"
  firstPageHasNoHeader: true

# ─────────────────────────────────────────────────────────────────────────
# 7. Deck layout (slide decks)
# ─────────────────────────────────────────────────────────────────────────
deck:
  slideSize: "16:9"
  dimensionsPx: { width: 1920, height: 1080 }
  margins:
    top:    60
    right:  80
    bottom: 60
    left:   80
  titleBar:
    enabled: true
    heightPx: 88
  footer:
    enabled: true
    heightPx: 44
    content: "logo-left + page-number-right + confidentiality-center"

# ─────────────────────────────────────────────────────────────────────────
# 8. Document elements
# ─────────────────────────────────────────────────────────────────────────
elements:
  headings:
    numbering: "decimal-nested"
    casing: "sentence"
  paragraph:
    align: "left"
    indentFirstLine: false
    spaceAfter: 6
  bullets:
    marker: "•"
    indentPx: 16
    nestedMarker: "–"
  callouts:
    defaultStyle: "info"
    iconSet: "lucide"
  quotes:
    style: "left-rule"
    accentColor: "semantic.accent"
  code:
    background: "neutral.50"
    border:     "semantic.border"
  tables:
    headerFill: "brand.primary"
    headerText: "semantic.textOnBrand"
    zebraFill:  "neutral.50"
    borderColor: "semantic.border"

# ─────────────────────────────────────────────────────────────────────────
# 9. Charts
# ─────────────────────────────────────────────────────────────────────────
charts:
  defaultPalette: "qualitative"
  background: "transparent"
  gridLines:
    color: "neutral.200"
    style: "dashed"
  axisLabels:
    font: "body"
    sizePx: 10
    color: "semantic.textSecondary"
  legend:
    position: "bottom"
    font: "body"
    sizePx: 10
  dataLabels:
    enabled: false

# ─────────────────────────────────────────────────────────────────────────
# 10. Tone & language defaults
# ─────────────────────────────────────────────────────────────────────────
tone:
  voice: "expert, concise, evidence-led"
  forbiddenWords: ["leverage", "synergy", "best-in-class", "world-class"]
  defaultLanguage: "en"

# ─────────────────────────────────────────────────────────────────────────
# 10b. Consultancy member headshots
# ─────────────────────────────────────────────────────────────────────────
headshots:
  jane-smith: "assets/headshots/jane-smith.svg"
  pierre-dubois: "assets/headshots/pierre-dubois.svg"
  marie-chen: "assets/headshots/marie-chen.svg"

# ─────────────────────────────────────────────────────────────────────────
# 11. Future / reserved
# ─────────────────────────────────────────────────────────────────────────
interactiveHtml: {}
darkMode: {}
accessibility:
  contrastTarget: "AA"
  reducedMotion: false
