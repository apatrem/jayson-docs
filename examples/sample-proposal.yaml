  - id: "33333333-3333-3333-3333-333333333333"
    title: "Approach"
    blocks:
      - id: "b3-timeline-01"
        type: "timeline"
        orientation: "horizontal"
        connector: "arrow"
        phases:
          - label: "Diagnostic"
            subtitle: "Weeks 1–3"
            body: "Baseline energy footprint and OPEX exposure across sites."
            duration: "3 weeks"
          - label: "Market scan"
            subtitle: "Weeks 4–6"
            body: "SMR vendor landscape; offtake terms; co-investor mapping."
            duration: "3 weeks"
          - label: "Business case"
            subtitle: "Weeks 7–10"
            body: "Quantified CAPEX/OPEX/regulatory model per site, sensitivity analysis."
            duration: "4 weeks"
          - label: "Recommendation"
            subtitle: "Weeks 11–12"
            body: "Go/no-go memo, board-ready deck, contract framework."
            duration: "2 weeks"

      - id: "b3-chart-01"
        type: "chart"
        chartType: "stacked-bar"
        title: "Projected annual OPEX by scenario"
        takeaway: "SMR scenario reduces OPEX by 38% by year 5 vs status quo, even before carbon-credit upside."
        data:
          series:
            - name: "Fuel"
              values: [42, 44, 46, 48, 50]
            - name: "Carbon (ETS)"
              values: [3, 5, 7, 11, 16]
            - name: "Maintenance"
              values: [8, 8, 8, 8, 8]
          xLabels: ["2026", "2027", "2028", "2029", "2030"]
          unit: "€M"
        axes:
          xTitle: "Year"
          yTitle: "Annual OPEX"
          ySuffix: "M"
        palette: "qualitative"
        showLegend: true
        showDataLabels: false

