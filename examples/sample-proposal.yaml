        level: 2
        text: "Strategic context"
        numbered: true

      - id: "b2-prose-01"
        type: "prose"
        content:
          type: "doc"
          content:
            - type: "paragraph"
              content:
                - type: "text"
                  text: "Acme's three European production sites require continuous high-temperature process heat (350–550°C). Current natural-gas dependency creates three risks:"

      - id: "b2-bullets-01"
        type: "bullet-list"
        items:
          - text:
              type: "doc"
              content:
                - type: "paragraph"
                  content:
                    - type: "text"
                      text: "Cost volatility — gas-price exposure on 60% of OPEX"
          - text:
              type: "doc"
              content:
                - type: "paragraph"
                  content:
                    - type: "text"
                      text: "Regulatory drift — EU ETS scope-1 emissions cap tightening through 2030"
          - text:
              type: "doc"
              content:
                - type: "paragraph"
                  content:
                    - type: "text"
                      text: "Client expectations — Tier-1 customers requiring Scope-3 disclosures by 2027"

      - id: "b2-heading-02"
        type: "heading"
        level: 2
        text: "Objectives"
        numbered: true

      - id: "b2-bullets-02"
        type: "bullet-list"
        items:
          - text:
              type: "doc"
              content:
                - type: "paragraph"
                  content:
                    - type: "text"
                      text: "Quantify the SMR business case across the 3 sites (CAPEX, OPEX, regulatory upside)"
          - text:
              type: "doc"
              content:
                - type: "paragraph"
                  content:
                    - type: "text"
                      text: "Identify 2 viable SMR vendor partnerships for offtake contracts"
          - text:
              type: "doc"
              content:
                - type: "paragraph"
                  content:
                    - type: "text"
                      text: "Produce a board-ready go/no-go recommendation by week 12"

