name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify Ruby (runner image)
        run: ruby --version

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check spec files parse
        run: ruby scripts/check-specs

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  rust-lockfile-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Toolchain pin lives in src-tauri/rust-toolchain.toml (MSRV = lockfile floor).
      - name: Install Rust 1.88.0
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.88.0 --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustc --version

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            starter/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'starter/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo check --locked (main src-tauri)
        working-directory: src-tauri
        run: cargo check --locked

      - name: cargo check --locked (starter src-tauri)
        working-directory: starter/src-tauri
        run: cargo check --locked
