name: CI

# Runs on every push (any branch — gives each agent pre-PR feedback) and on
# every PR targeting main (the gate before integration). A clean git merge is
# NOT proof of correctness — this is. Keep it green.
on:
  push:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test
      - run: npm run validate
