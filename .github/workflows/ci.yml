name: CI

# Runs on every push (any branch — gives each agent pre-PR feedback) and on
# every PR targeting main (the gate before integration). A clean git merge is
# NOT proof of correctness — this is. Keep it green.
on:
  push:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Enable Corepack (provides pnpm, pinned by package.json "packageManager")
      # BEFORE setup-node, so `cache: pnpm` can resolve the pnpm store path.
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run validate
