name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify gates
        run: bash scripts/verify-gates.sh

  build-installers:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifactGlob: "src-tauri/target/release/bundle/dmg/*.dmg"
          - platform: windows-latest
            artifactGlob: "src-tauri/target/release/bundle/msi/*.msi"
          - platform: ubuntu-latest
            artifactGlob: "src-tauri/target/release/bundle/appimage/*.AppImage"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Pin the toolchain so a `v1.0.0` re-build six months from now produces
      # the same binary surface. Bump the version intentionally rather than
      # drifting silently with @stable.
      - name: Install Rust 1.88.0
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.88.0 --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustc --version

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build and publish installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Document System ${{ github.ref_name }}"
          releaseBody: "Signed installers for macOS and Windows; unsigned AppImage for Linux."
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          # T-109 (Tauri updater) is still [!] — no updater signing key, no
          # feed URL. Emitting latest.json without those would ship a
          # partial-state release that the app couldn't validate. Re-enable
          # this when T-109 lands. See BLOCKERS.md §T-109.
          includeUpdaterJson: false

      - name: Verify installer artifact exists
        shell: bash
        run: |
          shopt -s nullglob
          files=( ${{ matrix.artifactGlob }} )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer artifact matched ${{ matrix.artifactGlob }}" >&2
            exit 1
          fi
